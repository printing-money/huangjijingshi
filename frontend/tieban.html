<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>铁板神数 · 批命</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'PingFang SC', sans-serif; background: #0f1923; color: #e0e0e0; min-height: 100vh; }
nav { background: #0a1018; padding: 0.6rem 1.5rem; display: flex; align-items: center; gap: 1.5rem; border-bottom: 1px solid #222; }
nav .brand { color: #e8a838; font-size: 1rem; font-weight: bold; text-decoration: none; }
nav a { color: #8899aa; text-decoration: none; font-size: 0.85rem; padding: 0.3rem 0.8rem; border-radius: 4px; }
nav a:hover, nav a.active { color: #e0e0e0; background: rgba(255,255,255,0.05); }

.container { max-width: 600px; margin: 0 auto; padding: 2rem 1rem; }
h1 { text-align: center; font-size: 1.6rem; color: #e8a838; letter-spacing: 0.3em; margin-bottom: 0.5rem; }
.subtitle { text-align: center; color: #8899aa; font-size: 0.85rem; margin-bottom: 2rem; }

.form-group { margin-bottom: 1.2rem; }
.form-group label { display: block; font-size: 0.8rem; color: #8899aa; margin-bottom: 0.4rem; }
.form-group input, .form-group select {
  width: 100%; padding: 0.7rem 1rem; background: #1a2a3a; border: 1px solid #333;
  border-radius: 8px; color: #e0e0e0; font-size: 0.95rem;
}
.form-group input:focus, .form-group select:focus { border-color: #e8a838; outline: none; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
.hint { font-size: 0.75rem; color: #666; margin-top: 0.3rem; }

.btn-submit {
  width: 100%; padding: 0.9rem; background: linear-gradient(135deg, #e94560, #c73e54);
  color: #fff; border: none; border-radius: 10px; font-size: 1.1rem;
  font-weight: bold; cursor: pointer; margin-top: 1.5rem; letter-spacing: 0.2em;
}
.btn-submit:hover { opacity: 0.9; }
.btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

.result-panel { margin-top: 2rem; background: #1a2a3a; border-radius: 12px; padding: 1.5rem; border: 1px solid rgba(232,168,56,0.2); display: none; }
.result-panel.show { display: block; animation: fadeIn 0.3s; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

.result-panel h2 { font-size: 1rem; color: #e8a838; margin-bottom: 1rem; border-bottom: 1px solid #333; padding-bottom: 0.5rem; }
.bazi-display { text-align: center; background: #0f1923; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
.bazi-display .bazi { font-size: 1.3rem; color: #4ecdc4; font-weight: bold; letter-spacing: 0.1em; }
.bazi-display .lunar { font-size: 0.85rem; color: #8899aa; margin-top: 0.3rem; }

.calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; margin-bottom: 1.5rem; }
.calc-item { background: #0f1923; padding: 0.6rem; border-radius: 6px; text-align: center; }
.calc-item .label { font-size: 0.65rem; color: #8899aa; }
.calc-item .value { font-size: 1.1rem; color: #4ecdc4; font-weight: bold; margin-top: 0.2rem; }

.liunian-table { width: 100%; font-size: 0.85rem; border-collapse: collapse; }
.liunian-table th { color: #e8a838; font-weight: normal; text-align: left; padding: 0.5rem; border-bottom: 1px solid #333; }
.liunian-table td { padding: 0.5rem; border-bottom: 1px solid #1a2a3a; vertical-align: top; }
.liunian-table tr:hover { background: rgba(78,205,196,0.05); }
.liunian-table .age { color: #e8a838; font-weight: bold; min-width: 35px; }
.liunian-table .gz { color: #4ecdc4; min-width: 40px; }
.liunian-table .duanyu { color: #ccc; line-height: 1.5; }

.age-btn {
  padding: 0.3rem 0.7rem; font-size: 0.75rem; border: 1px solid #444;
  background: #0f1923; color: #8899aa; border-radius: 4px; cursor: pointer;
}
.age-btn:hover { border-color: #e8a838; color: #e8a838; }
.age-btn.active { background: #e8a838; color: #000; border-color: #e8a838; }
</style>
</head>
<body>

<nav>
  <a href="/" class="brand">皇极经世</a>
  <a href="/">大众版</a>
  <a href="/pro">专业版</a>
  <a href="/tieban" class="active">铁板批命</a>
  <a href="/docs">API文档</a>
</nav>

<div class="container">
  <h1>铁 板 神 数</h1>
  <p class="subtitle">输入出生时间，自动排盘批命 · 12000条文断词</p>

  <div class="form-row">
    <div class="form-group">
      <label>性别</label>
      <select id="gender"><option value="男">男</option><option value="女">女</option></select>
    </div>
    <div class="form-group">
      <label>出生时间</label>
      <input type="text" id="birthTime" placeholder="如 1990-06-15 14:30">
      <div class="hint">公历时间，系统自动转换农历和八字</div>
    </div>
  </div>

  <details style="margin-top:0.5rem;">
    <summary style="color:#8899aa;font-size:0.8rem;cursor:pointer;">可选：考刻验证信息（提高准确度）</summary>
    <div style="margin-top:0.8rem;">
      <div class="form-row">
        <div class="form-group"><label>父亲属相</label><input type="text" id="fatherZodiac" placeholder="如：虎"></div>
        <div class="form-group"><label>母亲属相</label><input type="text" id="motherZodiac" placeholder="如：兔"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>兄弟姐妹数</label><input type="number" id="siblingCount" placeholder="如：3"></div>
        <div class="form-group"><label>排行第几</label><input type="number" id="siblingRank" placeholder="如：2"></div>
      </div>
    </div>
  </details>

  <button class="btn-submit" id="submitBtn" onclick="doPaipan()">排 盘 批 命</button>

  <div class="result-panel" id="resultPanel">
    <div id="resultContent"></div>
  </div>
</div>

<script>
// 默认填入当前时间
document.addEventListener('DOMContentLoaded', () => {
  // 用服务器端注入的时间
  if (window.__SERVER_TIME__) {
    const t = window.__SERVER_TIME__;
    const m = String(t.month).padStart(2,'0');
    const d = String(t.day).padStart(2,'0');
    const h = String(t.hour).padStart(2,'0');
    const min = String(t.minute || 0).padStart(2,'0');
    document.getElementById('birthTime').value = `${t.year}-${m}-${d} ${h}:${min}`;
  }
});

async function doPaipan() {
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '排盘中...';

  const birthInput = document.getElementById('birthTime').value.trim();
  const birthTime = birthInput.replace('T', ' ');

  const body = {
    gender: document.getElementById('gender').value,
    birth_time: birthTime,
    father_zodiac: document.getElementById('fatherZodiac').value || null,
    mother_zodiac: document.getElementById('motherZodiac').value || null,
    sibling_count: +document.getElementById('siblingCount').value || null,
    sibling_rank: +document.getElementById('siblingRank').value || null,
  };

  try {
    const resp = await fetch('/api/tieban/paipan', {
      method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)
    });
    const data = await resp.json();
    if (data.error) { alert(data.error); return; }
    renderResult(data);
  } catch(e) {
    alert('排盘失败: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '排 盘 批 命';
  }
}

function renderResult(data) {
  const panel = document.getElementById('resultPanel');
  const content = document.getElementById('resultContent');
  const c = data.calculation;
  const input = data.input;

  // 计算当前年龄（用服务器时间，不用浏览器本地时间）
  const birthYear = parseInt(input.birth_time.split('-')[0]);
  const serverYear = window.__SERVER_TIME__ ? window.__SERVER_TIME__.year : new Date().getFullYear();
  const currentAge = serverYear - birthYear;

  let html = `
    <h2>📜 排盘结果</h2>
    <div class="bazi-display">
      <div class="bazi">${input.bazi}</div>
      <div class="lunar">${input.lunar} · ${input.birth_time}</div>
    </div>

    <div class="calc-grid">
      <div class="calc-item"><div class="label">先天命数</div><div class="value">${c.xiantian_num}</div></div>
      <div class="calc-item"><div class="label">本命数</div><div class="value">${c.benming_num}</div></div>
      <div class="calc-item"><div class="label">辟卦</div><div class="value">${c.hexagram}</div></div>
      <div class="calc-item"><div class="label">考刻</div><div class="value">${c.moment}</div></div>
    </div>

    <h2 style="margin-top:1.5rem;">📖 流年条文 <span style="font-size:0.75rem;color:#8899aa;font-weight:normal;">（共${data.liunian_count}年）</span></h2>
    <div style="display:flex;gap:0.5rem;margin-bottom:0.8rem;flex-wrap:wrap;">
      <button class="age-btn" onclick="showAgeRange(1,30)">1-30岁</button>
      <button class="age-btn" onclick="showAgeRange(31,60)">31-60岁</button>
      <button class="age-btn" onclick="showAgeRange(61,100)">61-100岁</button>
      <button class="age-btn active" onclick="showAgeRange(1,100)">全部</button>
      ${currentAge > 0 ? '<button class="age-btn" onclick="showAgeRange('+(currentAge-2)+','+(currentAge+5)+')">当前±</button>' : ''}
    </div>
    <table class="liunian-table" id="liunianTable">
      <tr><th>岁</th><th>年份</th><th>干支</th><th>断词</th></tr>
  `;

  for (const l of data.liunian) {
    const duanyu = l.duanyu || '<span style="color:#555">—</span>';
    const isCurrent = (l.age === currentAge);
    const highlight = isCurrent ? 'style="background:rgba(232,168,56,0.1);border-left:3px solid #e8a838;"' : '';
    html += `<tr class="ln-row" data-age="${l.age}" ${highlight}><td class="age">${l.age}${isCurrent?'★':''}</td><td style="color:#888;font-size:0.8rem;">${l.year||''}</td><td class="gz">${l.ganzhi}</td><td class="duanyu">${duanyu}</td></tr>`;
  }
  html += '</table>';

  content.innerHTML = html;
  panel.classList.add('show');
  panel.scrollIntoView({ behavior: 'smooth' });

  // 默认显示全部，高亮当前年龄行
  if (currentAge > 0 && currentAge <= 100) {
    setTimeout(() => {
      const row = document.querySelector(`tr[data-age="${currentAge}"]`);
      if (row) row.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 300);
  }
}

function showAgeRange(start, end) {
  const rows = document.querySelectorAll('.ln-row');
  rows.forEach(row => {
    const age = parseInt(row.dataset.age);
    row.style.display = (age >= start && age <= end) ? '' : 'none';
  });
  // 更新按钮状态
  document.querySelectorAll('.age-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}
</script>
</body>
</html>
